events {
  worker_connections  4096;  ## Default: 1024
}

http {
    server {
        listen  80;
        server_name 0.0.0.0;

        location /api/ {
            proxy_pass http://speakerbob:80;
            proxy_set_header Host            $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location / {
            root /var/www;
            try_files $uri $uri/ /index.html;
        }
      }
}